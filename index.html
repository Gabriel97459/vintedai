*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:#0f0e17;color:#ede9fe;overscroll-behavior:none}
:root{
  --p:#8b5cf6;--g:#10b981;--g2:#059669;
  --text:#ede9fe;--sub:#7c7a9a;--sub2:#4a4868;
  --card:rgba(255,255,255,.045);--border:rgba(255,255,255,.08);
  --inp:rgba(255,255,255,.055);--warn:#f59e0b;--danger:#ef4444;
  --r:16px;--rsm:10px;
}
input,textarea,select{font-family:'DM Sans',sans-serif;color:var(--text);outline:none}
input::placeholder,textarea::placeholder{color:var(--sub)}
input:focus,textarea:focus,select:focus{border-color:var(--p)!important;box-shadow:0 0 0 3px rgba(139,92,246,.15)!important}
input[type=range]{-webkit-appearance:none;appearance:none;height:4px;border-radius:99px;background:rgba(255,255,255,.15);outline:none;cursor:pointer;width:100%}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--g));cursor:pointer;box-shadow:0 2px 8px rgba(139,92,246,.4)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(139,92,246,.2);border-radius:99px}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(.88);opacity:0}70%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes dot{0%,80%,100%{transform:scale(0);opacity:.2}40%{transform:scale(1);opacity:1}}
@keyframes scanLine{0%{top:-2px;opacity:0}5%{opacity:1}95%{opacity:1}100%{top:100%;opacity:0}}
@keyframes notif{0%{transform:translateX(120%);opacity:0}10%{transform:translateX(0);opacity:1}80%{transform:translateX(0);opacity:1}100%{transform:translateX(120%);opacity:0}}
@keyframes progressPulse{0%,100%{opacity:1}50%{opacity:.6}}

.sidebar{width:220px;flex-shrink:0;background:rgba(255,255,255,.025);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:200;padding:22px 14px 18px}

.nb:hover{background:rgba(255,255,255,.05);color:var(--text)}
.nb.active{background:rgba(139,92,246,.15);color:var(--p);font-weight:700}
.nb .ic{font-size:16px;width:26px;text-align:center;flex-shrink:0}
.sfooter{padding-top:14px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px}

/* AI TRANSFORM PROGRESS */

.ai-step.active{color:var(--g);font-weight:700}
.ai-step.done{color:var(--p)}

/* AUTH */

.auth-tab.active{background:rgba(255,255,255,.09);color:var(--text)}

.btn-google{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:11px 18px;border-radius:var(--rsm);border:1.5px solid var(--border);cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;background:rgba(255,255,255,.04);color:var(--text);transition:all .18s;margin-bottom:14px}
.btn-google:hover{background:rgba(255,255,255,.08)}
.auth-err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:var(--rsm);padding:10px 13px;font-size:13px;color:#fca5a5;margin-bottom:14px;display:none}
.auth-ok{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);border-radius:var(--rsm);padding:10px 13px;font-size:13px;color:#a7f3d0;margin-bottom:14px;display:none}
.guest-box{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);border-radius:var(--rsm);padding:14px 16px;margin-top:16px}
.guest-box p{font-size:13px;color:#fde68a;line-height:1.65;margin-bottom:12px}

.forgot-link:hover{text-decoration:underline}
</style>

let FAL_KEY = localStorage.getItem('vai_fal_key') || '7bc542c6-dd36-4ba6-98dd-9c2614ee41a4:207622966ffd193dc0ea88460a884e66';
let HF_KEY = localStorage.getItem('vai_hf_key') || '';

// ══ GROQ ══
async function callGroq(messages, system, max = 1200, vision = false) {
  // Utilise la Netlify Function (clé secrète côté serveur) ou fallback clé locale
  const useProxy = window.location.hostname.includes('netlify.app') || window.location.hostname.includes('netlify');
  const endpoint = useProxy
    ? '/.netlify/functions/groq'
    : 'https://api.groq.com/openai/v1/chat/completions';
  const headers = useProxy
    ? { 'Content-Type': 'application/json' }
    : { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + GROQ_KEY };
  const r = await fetch(endpoint, {
    method: 'POST',
    headers,
    body: JSON.stringify({ model: vision ? GROQ_VISION : GROQ_TEXT, max_tokens: max, messages: [{ role: 'system', content: system }, ...messages] })
  });
  if (!r.ok) throw new Error('Groq ' + r.status + ': ' + await r.text());
  return (await r.json()).choices?.[0]?.message?.content || '';
}
function pJ(raw) {
  const clean = raw.replace(/```json|```/g, '').trim();
  const s = clean.indexOf('{'), e = clean.lastIndexOf('}');
  return JSON.parse(s > -1 ? clean.slice(s, e + 1) : clean);
}

// ══ FAL.AI - REAL AI IMAGE TRANSFORMATION ══
async function transformImageWithAI(imageBase64, bgChoice, onProgress) {
  onProgress && onProgress(10, lang === 'fr' ? 'Envoi de la photo…' : 'Uploading photo…');

  const bgDescriptions = {
    white: 'pure white seamless studio background, professional fashion photography',
    grey: 'soft light grey seamless background, minimalist studio photography',
    marble: 'elegant beige marble surface background, luxury fashion photography',
    sky: 'soft pastel light blue sky background, fresh and clean',
    rug: 'white textured flat lay rug with visible border, lifestyle fashion photography'
  };
  const bgDesc = bgDescriptions[bgChoice] || bgDescriptions.white;
  const prompt = `Professional e-commerce fashion product photography. Clothing item neatly folded and perfectly presented on ${bgDesc}. Fabric is smooth with only natural seam texture, no wrinkles or creases. Bright even studio lighting, sharp focus, ultra realistic, high quality. The garment looks appealing and desirable for online selling.`;
  const negativePrompt = 'wrinkles, creases, messy, dirty, bad lighting, dark shadows, low quality, blurry, watermark, text, logo overlay';

  // Step 1: Convert base64 to blob and upload to fal.ai storage
  onProgress && onProgress(20, lang === 'fr' ? 'Téléchargement de l\'image…' : 'Uploading image…');

  let imageUrl;
  try {
    const byteChars = atob(imageBase64);
    const byteArr = new Uint8Array(byteChars.length);
    for(let i=0;i<byteChars.length;i++) byteArr[i]=byteChars.charCodeAt(i);
    const blob = new Blob([byteArr], {type:'image/jpeg'});
    const formData = new FormData();
    formData.append('file', blob, 'photo.jpg');
    const uploadRes = await fetch('https://fal.run/fal-ai/storage/upload', {
      method: 'POST',
      headers: { 'Authorization': 'Key ' + FAL_KEY },
      body: formData
    });
    if (uploadRes.ok) {
      const uploadData = await uploadRes.json();
      imageUrl = uploadData.url || uploadData.file_url;
    }
  } catch(uploadErr) { console.warn('Upload fallback:', uploadErr); }

  // Fallback: use data URL directly
  if (!imageUrl) {
    imageUrl = 'data:image/jpeg;base64,' + imageBase64;
  }

  onProgress && onProgress(35, lang === 'fr' ? 'L\'IA analyse votre vêtement…' : 'AI analysing your garment…');

  // Step 2: Transform with flux image-to-image
  const transformRes = await fetch('https://fal.run/fal-ai/flux/dev/image-to-image', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Key ' + FAL_KEY },
    body: JSON.stringify({
      image_url: imageUrl,
      prompt,
      negative_prompt: negativePrompt,
      strength: 0.72,
      num_inference_steps: 30,
      guidance_scale: 7,
      num_images: 1,
      image_size: 'square_hd',
      seed: Math.floor(Math.random() * 999999)
    })
  });

  onProgress && onProgress(70, lang === 'fr' ? 'Transformation en cours… (30-60 sec)' : 'Transforming… (30-60 sec)');

  if (!transformRes.ok) {
    const errBody = await transformRes.text();
    // Try with flux-schnell as fallback
    onProgress && onProgress(75, lang === 'fr' ? 'Tentative avec modèle alternatif…' : 'Trying alternative model…');
    const fallbackRes = await fetch('https://fal.run/fal-ai/flux/schnell/image-to-image', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Key ' + FAL_KEY },
      body: JSON.stringify({
        image_url: imageUrl,
        prompt,
        strength: 0.72,
        num_inference_steps: 8,
        num_images: 1,
        image_size: 'square_hd'
      })
    });
    if (!fallbackRes.ok) throw new Error('fal.ai erreur : ' + errBody.slice(0, 200));
    const fallbackData = await fallbackRes.json();
    onProgress && onProgress(95, lang === 'fr' ? 'Finalisation…' : 'Finalising…');
    const fallbackUrl = fallbackData.images?.[0]?.url;
    if (!fallbackUrl) throw new Error('Aucune image retournée');
    return await fetchAsDataUrl(fallbackUrl);
  }

  const data = await transformRes.json();
  onProgress && onProgress(95, lang === 'fr' ? 'Finalisation de la photo…' : 'Finalising photo…');
  const resultUrl = data.images?.[0]?.url || data.image?.url;
  if (!resultUrl) throw new Error('Aucune image retournée par fal.ai');
  const result = await fetchAsDataUrl(resultUrl);
  onProgress && onProgress(100, lang === 'fr' ? '✨ Transformation terminée !' : '✨ Done!');
  return result;
}

// ══ HUGGING FACE — SUPPRESSION DE FOND GRATUITE ══
async function transformImageWithHF(imageBase64, bgChoice, onProgress) {
  onProgress && onProgress(10, lang==='fr'?'Envoi vers Hugging Face…':'Sending to Hugging Face…');

  // Convertit base64 → blob
  const byteChars = atob(imageBase64);
  const byteArr = new Uint8Array(byteChars.length);
  for(let i=0;i<byteChars.length;i++) byteArr[i]=byteChars.charCodeAt(i);
  const blob = new Blob([byteArr], {type:'image/jpeg'});

  onProgress && onProgress(30, lang==='fr'?'Suppression du fond (IA gratuite)…':'Removing background (free AI)…');

  // Appel API Hugging Face RMBG-1.4
  const headers = {'Content-Type':'application/octet-stream'};
  if(HF_KEY) headers['Authorization'] = 'Bearer ' + HF_KEY;

  const res = await fetch('https://api-inference.huggingface.co/models/briaai/RMBG-1.4', {
    method:'POST', headers, body: blob
  });

  if(!res.ok) {
    const txt = await res.text();
    if(txt.includes('loading') || txt.includes('Loading')) {
      throw new Error('hf_loading'); // modèle en cours de chargement, réessayer
    }
    throw new Error('Hugging Face erreur '+res.status+': '+txt.slice(0,150));
  }

  onProgress && onProgress(70, lang==='fr'?'Application du fond…':'Applying background…');

  // Résultat = PNG avec fond transparent
  const pngBlob = await res.blob();
  const pngUrl = URL.createObjectURL(pngBlob);

  // Applique le fond choisi sur canvas
  const result = await applyBackgroundToTransparentImage(pngUrl, bgChoice);
  URL.revokeObjectURL(pngUrl);

  onProgress && onProgress(100, lang==='fr'?'✨ Fond supprimé !':'✨ Background removed!');
  return result;
}

// Applique un fond coloré/texturé sur une image PNG transparent
async function applyBackgroundToTransparentImage(pngUrl, bgChoice) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onerror = reject;
    img.onload = () => {
      const W = img.naturalWidth || 800;
      const H = img.naturalHeight || 800;
      const canvas = document.createElement('canvas');
      canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext('2d');

      // Dessine le fond
      const bgColors = {
        white:  () => { ctx.fillStyle='#FFFFFF'; ctx.fillRect(0,0,W,H); },
        grey:   () => { ctx.fillStyle='#E8E8E8'; ctx.fillRect(0,0,W,H); },
        marble: () => {
          const g = ctx.createLinearGradient(0,0,W,H);
          g.addColorStop(0,'#F5F0EB'); g.addColorStop(0.5,'#EDE5DA'); g.addColorStop(1,'#E8DDD0');
          ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
          // veines marbre
          ctx.strokeStyle='rgba(200,185,165,0.3)'; ctx.lineWidth=2;
          for(let i=0;i<6;i++){
            ctx.beginPath(); ctx.moveTo(Math.random()*W, 0);
            ctx.bezierCurveTo(Math.random()*W,H/3,Math.random()*W,H*2/3,Math.random()*W,H);
            ctx.stroke();
          }
        },
        sky: () => {
          const g = ctx.createLinearGradient(0,0,0,H);
          g.addColorStop(0,'#DAEEFF'); g.addColorStop(1,'#F0F8FF');
          ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
        },
        rug: () => {
          ctx.fillStyle='#F7F4EF'; ctx.fillRect(0,0,W,H);
          ctx.strokeStyle='rgba(200,190,175,0.5)'; ctx.lineWidth=1;
          for(let x=0;x<W;x+=8){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
          for(let y=0;y<H;y+=8){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
          ctx.strokeStyle='rgba(160,145,120,0.6)'; ctx.lineWidth=12;
          ctx.strokeRect(20,20,W-40,H-40);
        }
      };
      (bgColors[bgChoice] || bgColors.white)();

      // Dessine l'image par-dessus (fond transparent)
      ctx.drawImage(img, 0, 0, W, H);
      resolve(canvas.toDataURL('image/jpeg', 0.92));
    };
    img.src = pngUrl;
  });
}

async function fetchAsDataUrl(url) {
  const r = await fetch(url);
  const blob = await r.blob();
  return new Promise(res => { const reader = new FileReader(); reader.onload = () => res(reader.result); reader.readAsDataURL(blob); });
}

function compressImg(file, maxPx=1024){
  return new Promise((res,rej)=>{
    const reader=new FileReader();
    reader.onerror=rej;
    reader.onload=(e)=>{
      const img=new Image();
      img.onerror=rej;
      img.onload=()=>{
        let w=img.naturalWidth,h=img.naturalHeight;
        if(w>maxPx||h>maxPx){if(w>h){h=Math.round(h*maxPx/w);w=maxPx;}else{w=Math.round(w*maxPx/h);h=maxPx;}}
        const c=document.createElement('canvas');c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        const dataUrl=c.toDataURL('image/jpeg',.85);
        res({b64:dataUrl.split(',')[1],mt:'image/jpeg',dataUrl});
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function fileToBase64(file){
  return new Promise((res,rej)=>{
    const reader=new FileReader();
    reader.onerror=rej;
    reader.onload=e=>res(e.target.result.split(',')[1]);
    reader.readAsDataURL(file);
  });
}

  async function doTransform(){
    if(!file||loading)return;
    loading=true;progressPct=0;progressMsg='';
    controlCard.style.display='none';
    redrawPhoto();redrawProgress();

    try{
      const{b64}=await compressImg(file,900);
      let processedB64=b64;
      if(opts.brightness!==5||opts.contrast!==5||opts.saturation!==5||opts.wrinkles>0){
        processedB64=await applyCanvasAdjustments(file,opts);
      }
      let canvasFallback=false,resultDataUrl,hfUsed=false;
      // 1. Essai Hugging Face (gratuit)
      let hfAttempts=0;
      while(hfAttempts<2){
        try{
          resultDataUrl=await transformImageWithHF(processedB64,selectedBg,(pct,msg)=>{
            progressPct=pct;progressMsg=msg;redrawPhoto();redrawProgress();
          });
          hfUsed=true;break;
        }catch(hfErr){
          if(hfErr.message==='hf_loading'&&hfAttempts===0){
            // Modèle en chargement, on attend 20s et on réessaie
            progressMsg=lang==='fr'?'Modèle IA en démarrage (20s)…':'AI model warming up (20s)…';
            redrawProgress();
            await new Promise(r=>setTimeout(r,20000));
            hfAttempts++;
          }else{
            console.warn('HF failed, trying fal.ai:',hfErr.message);break;
          }
        }
      }
      // 2. Fallback fal.ai
      if(!hfUsed){
        try{
          resultDataUrl=await transformImageWithAI(processedB64,selectedBg,(pct,msg)=>{
            progressPct=pct;progressMsg=msg;redrawPhoto();redrawProgress();
          });
        }catch(aiErr){
          const isBalanceErr=aiErr.message.includes('Exhausted balance')||aiErr.message.includes('locked')||aiErr.message.includes('User is locked');
          const isAuthErr=aiErr.message.includes('401')||aiErr.message.includes('Unauthorized')||aiErr.message.includes('Invalid');
          if(isBalanceErr||isAuthErr||true){
            // 3. Fallback canvas
            canvasFallback=true;
            resultDataUrl='data:image/jpeg;base64,'+processedB64;
          }else{throw aiErr;}
        }
      }
      result={before:preview,after:resultDataUrl,canvasFallback};
    }catch(e){
      console.error('Transform error:',e);
      loading=false;
      progressCard.innerHTML='';
      progressCard.style.display='block';
      progressCard.appendChild(h('div',{className:'ebox'},lang==='fr'?'Erreur : '+e.message:'Error: '+e.message));
      redrawPhoto();redrawControls();return;
    }
    loading=false;progressCard.style.display='none';redrawPhoto();redrawControls();redrawResult();
  }

  redrawPhoto();redrawControls();redrawResult();return wrap;
}

// Apply canvas adjustments before AI transform
async function applyCanvasAdjustments(file, opts) {
  return new Promise((res,rej)=>{
    const reader=new FileReader();
    reader.onerror=rej;
    reader.onload=(e)=>{
      const img=new Image();
      img.onerror=rej;
      img.onload=()=>{
        const W=img.naturalWidth,H=img.naturalHeight;
        const c=document.createElement('canvas');c.width=W;c.height=H;
        const ctx=c.getContext('2d');
        let f='';
        if(opts.brightness!==5)f+=`brightness(${1+(opts.brightness-5)*0.04}) `;
        if(opts.contrast!==5)f+=`contrast(${1+(opts.contrast-5)*0.04}) `;
        if(opts.saturation!==5)f+=`saturate(${1+(opts.saturation-5)*0.06}) `;
        ctx.filter=f.trim()||'none';ctx.drawImage(img,0,0);
        if(opts.wrinkles>0){
          const bl=document.createElement('canvas');bl.width=W;bl.height=H;
          const bctx=bl.getContext('2d');bctx.filter=`blur(${opts.wrinkles*0.4}px)`;bctx.drawImage(c,0,0);
          ctx.globalAlpha=opts.wrinkles/10*0.5;ctx.filter='none';ctx.drawImage(bl,0,0);ctx.globalAlpha=1;
        }
        res(c.toDataURL('image/jpeg',.9).split(',')[1]);
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

    if(fk){localStorage.setItem('vai_fal_key',fk);FAL_KEY=fk;}
    if(hk){localStorage.setItem('vai_hf_key',hk);HF_KEY=hk;}
    saveBtn.textContent='✅ '+(lang==='fr'?'Sauvegardé !':'Saved!');
    setTimeout(()=>ov.remove(),1500);
  }},lang==='fr'?'💾 Sauvegarder':'💾 Save');
  box.appendChild(saveBtn);
  box.appendChild(h('button',{className:'btng',style:{marginTop:8},onClick:()=>ov.remove()},lang==='fr'?'Annuler':'Cancel'));
  ov.appendChild(box);document.body.appendChild(ov);
}

// ══ INSTALL ══
function showInstallModal(){
  const isIOS=/iphone|ipad/i.test(navigator.userAgent);
  const steps=lang==='fr'?(isIOS?['Ouvrez ce lien dans Safari (pas Chrome)','Appuyez sur ⬆️ Partager en bas',"Choisissez « Sur l'écran d'accueil »","Appuyez sur « Ajouter » 🎉"]:['Appuyez sur ⋮ en haut à droite de Chrome',"Choisissez « Ajouter à l'écran d'accueil »",'Confirmez 🎉']):(isIOS?['Open in Safari','Tap ⬆️ Share',"Choose 'Add to Home Screen'","Tap 'Add' 🎉"]:['Tap ⋮ in Chrome',"Choose 'Add to Home screen'",'Confirm 🎉']);
  const ov=h('div',{style:{position:'fixed',inset:0,background:'rgba(0,0,0,.82)',zIndex:1000,display:'flex',alignItems:'flex-end',justifyContent:'center'}});ov.addEventListener('click',()=>ov.remove());
  const box=h('div',{style:{background:'#0f0e17',borderRadius:'20px 20px 0 0',padding:'20px 18px 36px',width:'100%',maxWidth:480,border:'1px solid var(--border)',animation:'pop .3s ease'}});box.addEventListener('click',e=>e.stopPropagation());
  box.appendChild(h('div',{style:{width:36,height:4,borderRadius:99,background:'rgba(255,255,255,.12)',margin:'0 auto 16px'}}));
  box.appendChild(h('div',{style:{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:18,marginBottom:4}},'📲 '+(lang==='fr'?"Installer l'app":'Install the app')));
  box.appendChild(h('div',{style:{fontSize:12,color:'var(--sub)',marginBottom:18}},isIOS?'Safari requis · iPhone / iPad':'Chrome requis · Android'));
  steps.forEach((s,i)=>box.appendChild(h('div',{style:{display:'flex',gap:10,alignItems:'flex-start',marginBottom:13}},h('div',{style:{width:24,height:24,borderRadius:'50%',background:'linear-gradient(135deg,var(--p),var(--g))',color:'white',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:11,flexShrink:0}},(i+1)+''),h('div',{style:{fontSize:13,color:'var(--text)',lineHeight:1.6,paddingTop:3}},s))));
  box.appendChild(h('button',{className:'btn',style:{marginTop:14},onClick:()=>ov.remove()},lang==='fr'?'Compris !':'Got it!'));
  ov.appendChild(box);document.body.appendChild(ov);
}

// ══ INIT ══
async function init(){
  const{data:{session}}=await sb.auth.getSession();
  if(session){currentUser=session.user;isGuest=false;render();}
  else{showAuth();}
  sb.auth.onAuthStateChange((event,session)=>{
    currentUser=session?.user||null;
    if(currentUser){isGuest=false;render();}
    else if(event==='SIGNED_OUT'){isGuest=false;showAuth();}
  });
}
init();
</script>
