<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="VintedAI"/>
<meta name="theme-color" content="#0f0e17"/>
<title>VintedAI — Vendez plus vite</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:#0f0e17;color:#ede9fe;overscroll-behavior:none}
:root{
  --p:#8b5cf6;--g:#10b981;--g2:#059669;
  --text:#ede9fe;--sub:#7c7a9a;--sub2:#4a4868;
  --card:rgba(255,255,255,.045);--border:rgba(255,255,255,.08);
  --inp:rgba(255,255,255,.055);--warn:#f59e0b;--danger:#ef4444;
  --r:16px;--rsm:10px;
}
input,textarea,select{font-family:'DM Sans',sans-serif;color:var(--text);outline:none}
input::placeholder,textarea::placeholder{color:var(--sub)}
input:focus,textarea:focus,select:focus{border-color:var(--p)!important;box-shadow:0 0 0 3px rgba(139,92,246,.15)!important}
input[type=range]{-webkit-appearance:none;appearance:none;height:4px;border-radius:99px;background:rgba(255,255,255,.15);outline:none;cursor:pointer;width:100%}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--g));cursor:pointer;box-shadow:0 2px 8px rgba(139,92,246,.4)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(139,92,246,.2);border-radius:99px}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(.88);opacity:0}70%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes dot{0%,80%,100%{transform:scale(0);opacity:.2}40%{transform:scale(1);opacity:1}}
@keyframes scanLine{0%{top:-2px;opacity:0}5%{opacity:1}95%{opacity:1}100%{top:100%;opacity:0}}
@keyframes filterAnim{0%{filter:none}35%{filter:brightness(1.3)saturate(1.5)contrast(1.1)}100%{filter:brightness(1.1)saturate(1.08)contrast(1.07)}}
@keyframes notif{0%{transform:translateX(120%);opacity:0}10%{transform:translateX(0);opacity:1}80%{transform:translateX(0);opacity:1}100%{transform:translateX(120%);opacity:0}}

#app{display:flex;min-height:100vh}
.sidebar{width:220px;flex-shrink:0;background:rgba(255,255,255,.025);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:200;padding:22px 14px 18px}
.logo{padding:2px 8px 22px;border-bottom:1px solid var(--border);margin-bottom:10px}
.logo h1{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;background:linear-gradient(135deg,var(--p),var(--g));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo p{font-size:11px;color:var(--sub);margin-top:2px}
.nav{display:flex;flex-direction:column;gap:2px;flex:1;overflow-y:auto}
.nb{display:flex;align-items:center;gap:10px;width:100%;padding:9px 10px;border-radius:var(--rsm);border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--sub);background:transparent;transition:all .18s;text-align:left}
.nb:hover{background:rgba(255,255,255,.05);color:var(--text)}
.nb.active{background:rgba(139,92,246,.15);color:var(--p);font-weight:700}
.nb .ic{font-size:16px;width:26px;text-align:center;flex-shrink:0}
.sfooter{padding-top:14px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.main{margin-left:220px;flex:1;padding:32px 40px 48px;min-height:100vh}
.ubadge{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:var(--rsm);background:rgba(139,92,246,.08);border:1px solid rgba(139,92,246,.2)}
.uavatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--g));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:white;flex-shrink:0}
.uemail{font-size:11px;color:var(--sub);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.guest-badge{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:var(--rsm);background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);font-size:11px;color:var(--warn)}

@media(max-width:700px){
  .sidebar{width:100%;height:60px;top:auto;bottom:0;flex-direction:row;padding:0;border-right:none;border-top:1px solid var(--border)}
  .logo,.sfooter{display:none}
  .nav{flex-direction:row;gap:0;overflow:visible}
  .nb{flex-direction:column;gap:2px;font-size:10px;padding:7px 3px;border-radius:0;justify-content:center;align-items:center;flex:1}
  .nb .ic{font-size:18px;width:auto}
  .main{margin-left:0;padding:16px 14px 74px}
  .nbox{top:auto!important;bottom:72px!important;right:10px!important;left:10px!important;max-width:none!important}
}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px;box-shadow:0 2px 20px rgba(0,0,0,.3);animation:fadeUp .26s ease both}
.csm{background:var(--card);border:1px solid var(--border);border-radius:var(--rsm);padding:14px}
.inp{width:100%;padding:10px 13px;border-radius:var(--rsm);border:1.5px solid var(--border);background:var(--inp);color:var(--text);font-size:14px;transition:border .18s,box-shadow .18s}
.sel{appearance:none;cursor:pointer}
.lbl{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px;display:block}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:12px 18px;border-radius:var(--rsm);border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:700;font-size:14px;background:linear-gradient(135deg,var(--p),var(--g));color:white;box-shadow:0 4px 16px rgba(139,92,246,.3);transition:all .18s}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(139,92,246,.4)}
.btn:disabled{background:rgba(255,255,255,.07);color:var(--sub2);box-shadow:none;cursor:default;transform:none}
.btng{display:inline-flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:11px 18px;border-radius:var(--rsm);border:1.5px solid var(--border);cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;background:rgba(255,255,255,.05);color:var(--text);transition:all .18s}
.btng:hover{background:rgba(255,255,255,.09)}
.btsm{padding:7px 14px;font-size:13px}
.chip{padding:6px 13px;border-radius:99px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .15s;background:var(--inp);color:var(--sub)}
.chip.on{background:linear-gradient(135deg,var(--p),var(--g));color:white}
.uzone{border:2px dashed var(--border);border-radius:var(--rsm);cursor:pointer;overflow:hidden;position:relative;transition:all .2s;background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:165px}
.uzone:hover,.uzone.drag{border-color:var(--p);background:rgba(139,92,246,.05)}
.uzone.has-img{border-style:solid;border-color:rgba(16,185,129,.35);min-height:auto}
.swrap{position:relative;overflow:hidden;border-radius:var(--rsm)}
.sline{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--p),var(--g),var(--p),transparent);animation:scanLine 1.8s linear infinite;z-index:10;box-shadow:0 0 10px rgba(139,92,246,.6)}
.cwrap{position:relative;border-radius:var(--rsm);overflow:hidden;cursor:ew-resize;user-select:none;touch-action:none}
.pbar{height:3px;border-radius:99px;background:rgba(255,255,255,.07);overflow:hidden;margin-top:8px}
.pbf{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--p),var(--g));transition:width .4s ease}
.dots{display:flex;gap:5px;justify-content:center;padding:10px 0}
.dot{width:7px;height:7px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--g))}
.stitle{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--text);margin-bottom:4px}
.ssub{font-size:13px;color:var(--sub);margin-bottom:22px;line-height:1.5}
.ppill{background:linear-gradient(135deg,var(--p),var(--g));color:white;border-radius:var(--rsm);padding:7px 14px;font-family:'Syne',sans-serif;font-size:20px;font-weight:800;flex-shrink:0}
.ebox{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:var(--rsm);padding:11px;font-size:12px;color:#fca5a5;white-space:pre-wrap;margin-top:10px}
.nbox{position:fixed;top:16px;right:16px;z-index:9999;max-width:300px;animation:notif 4.2s ease forwards;background:linear-gradient(135deg,#1a1535,#0d2818);border:1px solid rgba(16,185,129,.35);border-radius:var(--r);padding:13px 16px;box-shadow:0 8px 32px rgba(0,0,0,.5)}

.slider-row{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.slider-header{display:flex;justify-content:space-between;align-items:center}
.slider-label{font-size:12px;font-weight:600;color:var(--text)}
.slider-val{font-size:12px;font-weight:800;color:var(--p);min-width:24px;text-align:right}

.bg-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:8px}
.bg-item{border-radius:10px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:all .18s;aspect-ratio:1;display:flex;flex-direction:column}
.bg-item.selected{border-color:var(--p);box-shadow:0 0 0 2px rgba(139,92,246,.4)}
.bg-item:hover{transform:scale(1.04)}
.bg-canvas{width:100%;flex:1;display:block}
.bg-lbl{font-size:9px;font-weight:600;color:var(--sub);text-align:center;padding:3px 2px;background:rgba(0,0,0,.5)}

/* AUTH */
.auth-screen{position:fixed;inset:0;background:#0f0e17;z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
.auth-box{background:#16142a;border:1px solid var(--border);border-radius:22px;padding:32px 28px;max-width:440px;width:100%;animation:pop .3s ease;margin:auto}
.auth-logo{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;background:linear-gradient(135deg,var(--p),var(--g));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin-bottom:4px}
.auth-tagline{text-align:center;font-size:13px;color:var(--sub);margin-bottom:28px}
.auth-tabs{display:flex;background:rgba(255,255,255,.04);border-radius:12px;padding:3px;gap:2px;margin-bottom:22px}
.auth-tab{flex:1;padding:8px;border-radius:9px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;font-size:13px;background:transparent;color:var(--sub);transition:all .18s}
.auth-tab.active{background:rgba(255,255,255,.09);color:var(--text)}
.divider{display:flex;align-items:center;gap:10px;margin:16px 0}
.divider span{font-size:12px;color:var(--sub2);white-space:nowrap}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.btn-google{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:11px 18px;border-radius:var(--rsm);border:1.5px solid var(--border);cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;background:rgba(255,255,255,.04);color:var(--text);transition:all .18s;margin-bottom:14px}
.btn-google:hover{background:rgba(255,255,255,.08)}
.auth-err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:var(--rsm);padding:10px 13px;font-size:13px;color:#fca5a5;margin-bottom:14px;display:none}
.auth-ok{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);border-radius:var(--rsm);padding:10px 13px;font-size:13px;color:#a7f3d0;margin-bottom:14px;display:none}
.guest-box{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);border-radius:var(--rsm);padding:14px 16px;margin-top:16px}
.guest-box p{font-size:13px;color:#fde68a;line-height:1.65;margin-bottom:12px}

/* PASSWORD FIELD */
.pass-wrap{position:relative}
.pass-wrap .inp{padding-right:44px}
.pass-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--sub);font-size:16px;padding:4px;line-height:1}
.pass-eye:hover{color:var(--text)}

/* FORGOT PASSWORD */
.forgot-link{font-size:12px;color:var(--p);cursor:pointer;text-align:right;display:block;margin-top:6px;margin-bottom:14px}
.forgot-link:hover{text-decoration:underline}
</style>

<script>
'use strict';

const SITE_URL = 'https://optivintedai.netlify.app';

const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhpcGtxaGN0cHlqanRtbXV4eGFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4Nzc4NDgsImV4cCI6MjA5NDQ1Mzg0OH0.ExADaMv_83GNQvWChw-xOeSexxcQfd76ZDcTVTlAvv4';
const GROQ_KEY = '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';
const GROQ_VISION = 'meta-llama/llama-4-scout-17b-16e-instruct';
const GROQ_TEXT = 'llama-3.3-70b-versatile';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let currentUser = null;
let isGuest = false;
let currentTab = 'create';
let lang = localStorage.getItem('vai_lang') || 'fr';

// ══ GROQ ══
async function callGroq(messages, system, max = 1200, vision = false) {
  const r = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + GROQ_KEY },
    body: JSON.stringify({ model: vision ? GROQ_VISION : GROQ_TEXT, max_tokens: max, messages: [{ role: 'system', content: system }, ...messages] })
  });
  if (!r.ok) throw new Error('Groq ' + r.status + ': ' + await r.text());
  return (await r.json()).choices?.[0]?.message?.content || '';
}
function pJ(raw) {
  const clean = raw.replace(/```json|```/g, '').trim();
  const s = clean.indexOf('{'), e = clean.lastIndexOf('}');
  return JSON.parse(s > -1 ? clean.slice(s, e + 1) : clean);
}

// ══ DB ══
async function dbGet(table) {
  if (isGuest) return JSON.parse(sessionStorage.getItem('g_' + table) || '[]');
  const { data, error } = await sb.from(table).select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false });
  if (error) throw error;
  return data || [];
}
async function dbInsert(table, row) {
  if (isGuest) {
    const items = JSON.parse(sessionStorage.getItem('g_' + table) || '[]');
    const item = { ...row, id: Date.now().toString(), created_at: new Date().toISOString() };
    items.unshift(item); sessionStorage.setItem('g_' + table, JSON.stringify(items));
    return item;
  }
  const { data, error } = await sb.from(table).insert({ ...row, user_id: currentUser.id }).select().single();
  if (error) throw error;
  return data;
}
async function dbDelete(table, id) {
  if (isGuest) {
    const items = JSON.parse(sessionStorage.getItem('g_' + table) || '[]').filter(i => i.id !== id);
    sessionStorage.setItem('g_' + table, JSON.stringify(items)); return;
  }
  const { error } = await sb.from(table).delete().eq('id', id).eq('user_id', currentUser.id);
  if (error) throw error;
}
async function dbUpdate(table, id, updates) {
  if (isGuest) {
    const items = JSON.parse(sessionStorage.getItem('g_' + table) || '[]').map(i => i.id === id ? { ...i, ...updates } : i);
    sessionStorage.setItem('g_' + table, JSON.stringify(items)); return;
  }
  const { error } = await sb.from(table).update(updates).eq('id', id).eq('user_id', currentUser.id);
  if (error) throw error;
}

// ══ IMAGE ══
function compressImg(file, maxPx = 1024) {
  return new Promise((res, rej) => {
    const img = new Image(), url = URL.createObjectURL(file);
    img.onload = () => {
      let { naturalWidth: w, naturalHeight: h } = img;
      if (w > maxPx || h > maxPx) { if (w > h) { h = Math.round(h * maxPx / w); w = maxPx; } else { w = Math.round(w * maxPx / h); h = maxPx; } }
      const c = document.createElement('canvas'); c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      const dataUrl = c.toDataURL('image/jpeg', 0.85);
      res({ b64: dataUrl.split(',')[1], mt: 'image/jpeg', dataUrl });
    };
    img.onerror = rej; img.src = url;
  });
}

// ══ BACKGROUNDS ══
const BACKGROUNDS = [
  {
    id: 'white', label: 'Blanc pur',
    draw: (ctx, w, h) => {
      ctx.fillStyle = '#FFFFFF'; ctx.fillRect(0, 0, w, h);
      const g = ctx.createRadialGradient(w/2, h*0.8, 0, w/2, h*0.8, h*0.6);
      g.addColorStop(0, 'rgba(245,245,245,0.6)'); g.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);
    }
  },
  {
    id: 'grey', label: 'Gris doux',
    draw: (ctx, w, h) => {
      const g = ctx.createLinearGradient(0, 0, 0, h);
      g.addColorStop(0, '#ECECEC'); g.addColorStop(1, '#D8D8D8');
      ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);
    }
  },
  {
    id: 'marble', label: 'Marbre',
    draw: (ctx, w, h) => {
      ctx.fillStyle = '#F2EDE8'; ctx.fillRect(0, 0, w, h);
      // marble veins
      for (let i = 0; i < 8; i++) {
        ctx.beginPath();
        ctx.strokeStyle = `rgba(200,185,170,${0.15 + Math.random()*0.2})`;
        ctx.lineWidth = Math.random() * 3 + 1;
        const x0 = Math.random() * w, y0 = 0;
        const cp1x = Math.random() * w, cp1y = h * 0.3;
        const cp2x = Math.random() * w, cp2y = h * 0.7;
        const x1 = Math.random() * w, y1 = h;
        ctx.moveTo(x0, y0); ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, x1, y1);
        ctx.stroke();
      }
      const g = ctx.createLinearGradient(0, 0, w, h);
      g.addColorStop(0, 'rgba(255,252,248,0.3)'); g.addColorStop(1, 'rgba(220,210,200,0.2)');
      ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);
    }
  },
  {
    id: 'sky', label: 'Bleu ciel',
    draw: (ctx, w, h) => {
      const g = ctx.createLinearGradient(0, 0, 0, h);
      g.addColorStop(0, '#C8E6FF'); g.addColorStop(1, '#A8D4FF');
      ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      [[w*0.2,h*0.25,55,18],[w*0.65,h*0.15,70,20],[w*0.45,h*0.3,40,14]].forEach(([x,y,rx,ry]) => {
        ctx.beginPath(); ctx.ellipse(x,y,rx,ry,0,0,Math.PI*2); ctx.fill();
      });
    }
  },
  {
    id: 'rug', label: 'Tapis',
    draw: (ctx, w, h) => {
      ctx.fillStyle = '#F0EDE6'; ctx.fillRect(0, 0, w, h);
      const m = Math.min(w,h)*0.05;
      ctx.save(); ctx.shadowColor='rgba(0,0,0,0.15)'; ctx.shadowBlur=20; ctx.shadowOffsetY=6;
      ctx.fillStyle='#FAFAF7';
      ctx.beginPath(); ctx.roundRect(m,m,w-m*2,h-m*2,10); ctx.fill();
      ctx.restore();
      ctx.strokeStyle='rgba(200,195,185,0.6)'; ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.roundRect(m+10,m+10,w-m*2-20,h-m*2-20,7); ctx.stroke();
      ctx.strokeStyle='rgba(210,205,195,0.3)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.roundRect(m+18,m+18,w-m*2-36,h-m*2-36,5); ctx.stroke();
      ctx.fillStyle='rgba(195,190,180,0.12)';
      for(let x=m+25;x<w-m-15;x+=9) for(let y=m+25;y<h-m-15;y+=9) {
        ctx.beginPath(); ctx.arc(x,y,0.9,0,Math.PI*2); ctx.fill();
      }
    }
  }
];

function drawBgPreview(canvas, bg) {
  const size = 80; canvas.width = size; canvas.height = size;
  bg.draw(canvas.getContext('2d'), size, size);
}

async function applyBackground(file, bgId, opts) {
  return new Promise((res, rej) => {

function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs || {})) {
    if (k==='className') el.className=v;
    else if (k.startsWith('on')&&typeof v==='function') el.addEventListener(k.slice(2).toLowerCase(),v);
    else if (k==='style'&&typeof v==='object') Object.assign(el.style,v);
    else el.setAttribute(k,v);
  }
  for (const c of children.flat(99)) {
    if (c==null||c===false) continue;
    el.appendChild(typeof c==='string'?document.createTextNode(c):c);
  }
  return el;
}

- Coupe et fit (oversized, slim, regular, relaxed...)
- État réel et honnête (neuf, très bon, bon état...)
- Défauts visibles (IMPORTANT : sois honnête, c'est légalement obligatoire)
- Style (streetwear, casual, chic, sportswear, vintage, workwear...)
- Saison(s) recommandée(s)
- Taille estimée si visible

GÉNÈRE UNE ANNONCE PREMIUM :
- Titre : ultra accrocheur et SEO optimisé, max 60 caractères, inclut marque + type + couleur/style clé
- Prix : juste et compétitif selon le marché Vinted actuel pour ce type d'article
- Description PREMIUM en ${isEn?'English':'Français'} avec exactement 4 paragraphes séparés par \\n\\n :

  * Paragraphe 2 (DÉTAILS TECHNIQUES) : Matière, coupe, caractéristiques spécifiques, finitions, petits détails qui font la différence. Sois précis et expert.
  * Paragraphe 3 (ÉTAT HONNÊTE) : État détaillé et transparent. Si des défauts existent, les mentionner clairement. Si parfait état, le valoriser.
  * Paragraphe 4 (PRATIQUE) : Taille, conseils d'entretien si pertinent, livraison soignée, réponse rapide aux questions, autres annonces disponibles.
- 6-8 hashtags très populaires sur Vinted

JSON UNIQUEMENT (pas de markdown, pas d'explication) :
{"title":"...","price":0,"priceMin":0,"priceMax":0,"brand":"...","size":"...","condition":"...","material":"...","color":"...","style":"...","description":"¶1\\n\\n¶2\\n\\n¶3\\n\\n¶4","defects":[],"tips":["...","...","..."],"hashtags":"#tag1 #tag2 #tag3 #tag4 #tag5 #tag6"}`;

  const wrap=h('div',{style:{display:'flex',flexDirection:'column',gap:14}},h('div',{},h('div',{className:'stitle'},'✨ '+(lang==='fr'?'Créer une annonce':'Create a listing')),h('div',{className:'ssub'},g(lang,'C','nm'))));
  const photoCard=h('div',{className:'card',style:{padding:0,overflow:'hidden'}});
  const resultCard=h('div',{className:'card',style:{display:'none'}});
  wrap.appendChild(photoCard);wrap.appendChild(resultCard);

  function redrawPhoto(){

            h('div',{style:{width:6,height:6,borderRadius:'50%',background:'var(--g)',animation:'pulse 1s infinite'}}),
            h('span',{style:{fontSize:12,color:'var(--g)',fontWeight:700}},lang==='fr'?'Génération de l\'annonce professionnelle…':'Generating professional listing…')
          )

      ));
      photoCard.appendChild(h('div',{style:{padding:'12px 18px'}},h('div',{className:'pbar'},h('div',{className:'pbf',style:{width:'65%'}}))));
    } else {
      photoCard.appendChild(buildUZone(photoUrl,lang==='fr'?'Déposer une photo ici':'Drop a photo here',lang==='fr'?'Changer':'Change',(f)=>{
        file=f;photoUrl=URL.createObjectURL(f);err='';result=null;redrawPhoto();redrawResult();setTimeout(doGen,80);

    }
    if(err) photoCard.appendChild(h('div',{className:'ebox',style:{margin:'0 14px 14px'}},err));
    if(!photoUrl&&!loading) photoCard.appendChild(h('div',{style:{padding:'0 18px 18px',textAlign:'center'}},h('p',{style:{fontSize:13,color:'var(--sub)',lineHeight:1.65}},lang==='fr'?"L'IA analyse la photo et génère automatiquement une annonce professionnelle complète — titre, description 4 paragraphes, prix juste, hashtags.":'AI analyses the photo and automatically generates a complete professional listing.')));
  }

  function redrawResult(){
    resultCard.innerHTML='';
    if(!result){resultCard.style.display='none';return;}
    resultCard.style.display='block';
    if(result.photoUrl) resultCard.appendChild(h('img',{src:result.photoUrl,style:{width:'100%',borderRadius:12,marginBottom:14,maxHeight:260,objectFit:'cover'}}));
    resultCard.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:10,marginBottom:10}},
      h('div',{style:{flex:1}},
        h('div',{style:{fontWeight:800,fontSize:17,lineHeight:1.35,marginBottom:8}},result.title||''),
        h('div',{style:{display:'flex',flexWrap:'wrap',gap:6}},...[result.brand,result.size,result.condition,result.material,result.color,result.style].filter(Boolean).map(tag=>h('span',{style:{fontSize:11,background:'rgba(139,92,246,.12)',color:'#c4b5fd',padding:'3px 9px',borderRadius:99,fontWeight:600}},tag)))
      ),
      h('div',{className:'ppill'},(result.price||'?')+'€')
    ));
    resultCard.appendChild(h('div',{style:{fontSize:12,color:'var(--sub)',marginBottom:16}},g(lang,'C','pr')+' : '+(result.priceMin||'?')+'€ – '+(result.priceMax||'?')+'€'));
    const descWrap=h('div',{style:{background:'rgba(255,255,255,.03)',borderRadius:13,padding:16,marginBottom:13,border:'1px solid rgba(255,255,255,.06)'}});
    (result.description||'').split('\n\n').filter(Boolean).forEach((p,i,arr)=>{
      descWrap.appendChild(h('p',{style:{fontSize:14,lineHeight:1.85,color:i===0?'var(--text)':'#ccc8ff',marginBottom:i<arr.length-1?12:0}},p));
    });
    resultCard.appendChild(descWrap);
    resultCard.appendChild(h('div',{style:{fontSize:13,color:'var(--p)',fontWeight:600,marginBottom:13}},result.hashtags||''));
    if(result.defects?.length){

      resultCard.appendChild(db);
    }
    if(result.tips?.length){
      const tb=h('div',{style:{background:'rgba(16,185,129,.07)',borderRadius:11,padding:11,marginBottom:15}},h('div',{style:{fontWeight:700,fontSize:12,color:'var(--g)',marginBottom:5}},g(lang,'C','tp')));
      result.tips.forEach(t=>tb.appendChild(h('div',{style:{fontSize:13,color:'#a7f3d0'}},'• '+t)));

      navigator.clipboard.writeText((result.title||'')+'\n\n'+(result.description||'')+'\n\n'+(result.hashtags||''));
      copyBtn.textContent=g(lang,'C','cc');setTimeout(()=>copyBtn.textContent=g(lang,'C','cb'),2200);
    }},g(lang,'C','cb'));
    const newBtn=h('button',{className:'btng',style:{flex:1},onClick:()=>{file=null;if(photoUrl)URL.revokeObjectURL(photoUrl);photoUrl=null;result=null;err='';redrawPhoto();redrawResult();}},g(lang,'C','nb'));
    resultCard.appendChild(h('div',{style:{display:'flex',gap:9}},copyBtn,newBtn));
  }

  async function doGen(){
    if(!file||loading)return;
    loading=true;redrawPhoto();
    try{
      const{b64,mt,dataUrl}=await compressImg(file);
      const raw=await callGroq([{role:'user',content:[{type:'image_url',image_url:{url:'data:'+mt+';base64,'+b64}},{type:'text',text:PROMPT(lang==='en')}]}],SYSTEM,1500,true);

      try{await dbInsert('listings',{title:parsed.title,price:parsed.price,price_min:parsed.priceMin,price_max:parsed.priceMax,description:parsed.description,hashtags:parsed.hashtags,defects:parsed.defects||[],tips:parsed.tips||[],photo_url:dataUrl});}catch(_){}
      result={...parsed,photoUrl:dataUrl};
    }catch(e){console.error(e);err=g(lang,'C','er')+'\n'+e.message;}
    loading=false;redrawPhoto();redrawResult();
  }

  redrawPhoto();redrawResult();
  return wrap;
}

  const resWrap=h('div',{style:{display:'none'}});
  wrap.appendChild(photoCard);wrap.appendChild(controlCard);wrap.appendChild(resWrap);

  function redrawPhoto(){
    photoCard.innerHTML='';

      photoCard.appendChild(h('div',{style:{position:'relative',overflow:'hidden',borderRadius:14}},
        h('img',{src:preview,style:{width:'100%',maxHeight:280,objectFit:'cover',display:'block',borderRadius:14,animation:'filterAnim 2s ease forwards'}}),

  function redrawControls(){
    controlCard.innerHTML='';
    if(!preview||loading||result){controlCard.style.display='none';return;}
    controlCard.style.display='block';
    controlCard.appendChild(h('div',{style:{fontWeight:700,fontSize:13,marginBottom:14,color:'var(--text)'}},g(lang,'R','adj')));
    [['wrinkles',g(lang,'R','wrinkles')],['brightness',g(lang,'R','brightness')],['contrast',g(lang,'R','contrast')],['saturation',g(lang,'R','saturation')]].forEach(([key,label])=>{
      controlCard.appendChild(buildSlider(label,opts[key],0,10,v=>{opts[key]=v;}));
    });
    controlCard.appendChild(h('div',{style:{fontWeight:700,fontSize:13,margin:'18px 0 10px',color:'var(--text)'}},g(lang,'R','bg')));
    const bgGrid=h('div',{className:'bg-grid'});
    BACKGROUNDS.forEach(bg=>{
      const item=h('div',{className:'bg-item'+(selectedBg===bg.id?' selected':''),onClick:()=>{
        selectedBg=bg.id;document.querySelectorAll('.bg-item').forEach(el=>el.classList.remove('selected'));item.classList.add('selected');
      }});
      const canvas=h('canvas',{className:'bg-canvas',title:bg.label});
      item.appendChild(canvas);
      item.appendChild(h('div',{className:'bg-lbl'},bg.label));
      bgGrid.appendChild(item);
      setTimeout(()=>drawBgPreview(canvas,bg),0);
    });
    controlCard.appendChild(bgGrid);
    controlCard.appendChild(h('button',{className:'btn',style:{marginTop:18},onClick:doProcess},g(lang,'R','bt')));
  }

  function redrawResult(){
    resWrap.innerHTML='';
    if(!result||loading){resWrap.style.display='none';return;}
    resWrap.style.display='block';
    const cw=h('div',{className:'cwrap'});
    const afterImg=h('img',{src:result.after,style:{width:'100%',maxHeight:340,objectFit:'cover',display:'block',borderRadius:14}});
    const beforeDiv=h('div',{style:{position:'absolute',top:0,left:0,width:slide+'%',height:'100%',overflow:'hidden'}},h('img',{src:result.before,style:{width:slide>0?(100*100/slide)+'%':'0%',maxWidth:'none',maxHeight:340,objectFit:'cover',display:'block'}}));
    const handle=h('div',{style:{position:'absolute',top:0,left:slide+'%',width:2,height:'100%',background:'white',transform:'translateX(-50%)',boxShadow:'0 0 8px rgba(0,0,0,.5)',zIndex:5}},h('div',{style:{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',width:32,height:32,borderRadius:'50%',background:'white',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,boxShadow:'0 2px 8px rgba(0,0,0,.35)'}},'⇄'));
    function onMove(e){if(!dragging)return;const rect=cw.getBoundingClientRect(),x=e.touches?.[0]?.clientX??e.clientX;slide=Math.min(100,Math.max(0,(x-rect.left)/rect.width*100));beforeDiv.style.width=slide+'%';handle.style.left=slide+'%';const bi=beforeDiv.querySelector('img');if(bi)bi.style.width=slide>0?(100*100/slide)+'%':'0%';}
    ['mousedown','touchstart'].forEach(ev=>cw.addEventListener(ev,()=>dragging=true));
    ['mouseup','touchend','mouseleave'].forEach(ev=>cw.addEventListener(ev,()=>dragging=false));
    ['mousemove','touchmove'].forEach(ev=>cw.addEventListener(ev,onMove));
    cw.appendChild(afterImg);cw.appendChild(beforeDiv);cw.appendChild(handle);
    cw.appendChild(h('div',{style:{position:'absolute',top:9,left:9,background:'rgba(0,0,0,.6)',color:'white',fontSize:11,fontWeight:700,padding:'3px 9px',borderRadius:99}},g(lang,'R','be')));
    cw.appendChild(h('div',{style:{position:'absolute',top:9,right:9,background:'linear-gradient(135deg,var(--p),var(--g))',color:'white',fontSize:11,fontWeight:800,padding:'3px 9px',borderRadius:99}},g(lang,'R','af')));
    resWrap.appendChild(h('div',{className:'card',style:{padding:0,overflow:'hidden',marginBottom:14}},cw));
    resWrap.appendChild(h('div',{style:{display:'flex',gap:10,marginBottom:14}},
      h('button',{className:'btng',style:{flex:1},onClick:()=>{result=null;redrawControls();redrawResult();}},lang==='fr'?'🔄 Modifier':'🔄 Edit'),
      h('a',{href:result.after,download:'vintedai-retouched.jpg',style:{flex:1,display:'flex',alignItems:'center',justifyContent:'center',padding:'11px 18px',borderRadius:'var(--rsm)',background:'linear-gradient(135deg,var(--p),var(--g))',color:'white',fontWeight:700,fontSize:14,textDecoration:'none'}},g(lang,'R','dl'))
    ));
  }

  async function doProcess(){
    if(!file||loading)return;
    loading=true;redrawPhoto();redrawControls();
    await new Promise(r=>setTimeout(r,2000));
    try{
      const processed=await applyBackground(file,selectedBg,opts);
      result={before:preview,after:processed};
    }catch(e){console.error(e);}
    loading=false;redrawPhoto();redrawControls();redrawResult();
  }

  redrawPhoto();redrawControls();redrawResult();
  return wrap;
}

  box.appendChild(h('div',{style:{fontSize:12,color:'var(--sub)',marginBottom:18}},isIOS?'Safari requis · iPhone / iPad':'Chrome requis · Android'));

// ══ INIT ══
async function init(){
  const{data:{session}}=await sb.auth.getSession();
  if(session){currentUser=session.user;isGuest=false;render();}
  else{showAuth();}
  sb.auth.onAuthStateChange((event,session)=>{
    currentUser=session?.user||null;
    if(currentUser){isGuest=false;render();}
    else if(event==='SIGNED_OUT'){isGuest=false;showAuth();}
  });
}
init();
